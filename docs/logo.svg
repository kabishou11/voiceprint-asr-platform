<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="48%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="256" height="256" rx="56" fill="url(#logoGrad)" opacity="0.12"/>
  <!-- Outer ring -->
  <rect x="32" y="32" width="192" height="192" rx="96" stroke="white" stroke-width="6" opacity="0.22"/>
  <!-- Middle ring -->
  <rect x="64" y="64" width="128" height="128" rx="64" stroke="white" stroke-width="6" opacity="0.30"/>
  <!-- Inner circle with VP text -->
  <rect x="96" y="96" width="64" height="64" rx="32" fill="white" opacity="0.15" stroke="white" stroke-width="5"/>
  <text x="128" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="900" fill="white" opacity="0.95" letter-spacing="3">VP</text>
  <!-- Left waveform bars -->
  <rect x="38" y="104" width="10" height="28" rx="5" fill="white" opacity="0.82"/>
  <rect x="52" y="88" width="10" height="60" rx="5" fill="white" opacity="0.72"/>
  <rect x="66" y="72" width="10" height="92" rx="5" fill="white" opacity="0.62"/>
  <!-- Right waveform bars -->
  <rect x="180" y="88" width="10" height="60" rx="5" fill="white" opacity="0.82"/>
  <rect x="194" y="104" width="10" height="28" rx="5" fill="white" opacity="0.72"/>
  <rect x="208" y="112" width="10" height="12" rx="5" fill="white" opacity="0.62"/>
  <!-- Teal dot accent -->
  <circle cx="204" cy="204" r="10" fill="#99f6e4" opacity="0.95"/>
</svg>
