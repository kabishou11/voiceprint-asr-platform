services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: voiceprint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../.env.example
    depends_on:
      - postgres
      - redis
      - minio
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../../
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../../.env.example
    depends_on:
      - postgres
      - redis
      - minio

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  postgres-data:
  minio-data:
